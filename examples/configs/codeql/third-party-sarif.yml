# =============================================================================
# Notes:
#   - SARIF files must conform to the SARIF 2.1.0 specification.
#   - GitHub accepts a maximum of 5000 results per SARIF upload.
#   - Each tool should use a unique `category` value so alerts are not mixed.
#   - If the upload step runs on a PR, alerts appear as PR annotations.
#   - You can enforce results via branch protection → "Require status checks"
#     by adding a Code Scanning rule that blocks on high-severity alerts.
#
# Reference:
#   https://docs.github.com/en/code-security/code-scanning/integrating-with-code-scanning/uploading-a-sarif-file-to-github
# =============================================================================
