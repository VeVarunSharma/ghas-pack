# =============================================================================
# CodeQL — Third-Party SARIF Upload Workflow
# =============================================================================
# Upload Static Analysis Results Interchange Format (SARIF) files from
# external / third-party security scanners into GitHub Code Scanning.
#
# Why?
#   - Centralise all code-scanning alerts in one place (Security tab).
#   - Get PR annotations even from tools that aren't CodeQL.
#   - Enforce branch-protection rules that require zero high-severity alerts
#     across ALL scanners.
#
# This workflow shows a generic pattern with placeholder steps for:
#   • Semgrep
#   • Snyk
#   • Trivy
#
# Copy this file to .github/workflows/third-party-sarif.yml and uncomment
# the scanner(s) you use.
# =============================================================================

name: "Third-Party SARIF Upload"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  security-events: write   # Required to upload SARIF
  contents: read

jobs:
  # ===========================================================================
  # Generic Scanner (replace with your own tool)
  # ===========================================================================
  generic-scanner:
    name: Run External Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # TODO: Replace this step with your scanner's CLI.
      # The scanner must produce a SARIF file (most modern tools support this).
      - name: Run scanner
        run: |
          echo "TODO: run your scanner here and output results.sarif"
          # Example: my-scanner --format sarif --output results.sarif .

      # Upload the SARIF file to GitHub Code Scanning.
      # The `sarif_file` path must match what your scanner writes.
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

          # (Optional) Category helps distinguish alerts from different tools
          # in the Security tab.
          category: "external-scanner"

