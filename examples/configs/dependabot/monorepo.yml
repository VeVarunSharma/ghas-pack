# =============================================================================
# Dependabot — Monorepo Configuration
# =============================================================================
# Tailored for repositories with multiple packages/services in subdirectories.
# Each directory gets its own schedule and settings so teams can move at their
# own pace without blocking each other.
#
# Copy this file to .github/dependabot.yml and adjust the directories below
# to match your project layout.
#
# Monorepo tips:
#   - Give each directory its own entry so Dependabot can open separate PRs.
#   - Use different schedules if some areas change faster than others.
#   - Use target-branch when you want dependency bumps to land on a specific
#     branch (e.g., a shared "deps" branch) instead of the default branch.
#   - Directory globs (e.g., /services/*) are supported via the `directories`
#     key. Use `directories` instead of `directory` when you need globs.
# =============================================================================

version: 2

updates:
  # ---- Frontend (npm) — updated daily because it ships often ----------------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"

    # (Optional) Target a specific branch instead of the default branch.
    # Useful when dependency PRs should go through a staging branch first.
    # target-branch: "develop"

  # ---- Backend (npm) — updated weekly since it's more stable ----------------
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"

  # ---- Services / API (npm) — monthly cadence for a slower-moving service ---
  - package-ecosystem: "npm"
    directory: "/services/api"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "services"

  # ---- Docker — keep base images current ------------------------------------
  # If your monorepo has Dockerfiles in multiple directories, add one entry
  # per directory. There is no glob support for directories.
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # ---- GitHub Actions — keep workflow actions pinned to latest --------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

# =============================================================================
# TIP: Directory globs (e.g., "/services/*") are supported via the
# `directories` key. Use `directories` instead of `directory` to target
# multiple subdirectories with a single entry:
#
#   - package-ecosystem: "npm"
#     directories:
#       - "/services/*"
#       - "/packages/*"
#     schedule:
#       interval: "weekly"
#
# This template uses the explicit `directory` approach which gives you
# per-directory control over schedules, labels, and other settings.
# =============================================================================
