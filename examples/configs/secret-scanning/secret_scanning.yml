# =============================================================================
# Secret Scanning — Path Exclusions
# =============================================================================
# By default, GitHub secret scanning inspects all files in every push.
# Use this configuration to exclude paths that are known to contain
# non-sensitive test data, documentation examples, or generated content.
#
# Copy this file to .github/secret_scanning.yml in your repository.
#
# ⚠️  WARNING: Be conservative with exclusions!
#     Every excluded path is a blind spot. Only exclude paths where you are
#     certain real secrets will never appear. Over-excluding defeats the
#     purpose of secret scanning.
# =============================================================================

paths-ignore:
  # ---- Test fixtures & mock data --------------------------------------------
  # Test files often contain fake API keys, tokens, or connection strings
  # that trigger false-positive alerts.
  - "tests/fixtures/**"
  - "test/fixtures/**"
  - "**/testdata/**"
  - "**/__mocks__/**"
  - "**/test-credentials/**"

  # ---- Documentation --------------------------------------------------------
  # Docs may include example keys like "sk_test_abc123" in code blocks.
  - "docs/**"
  - "**/*.md"

  # ---- Generated / vendored files ------------------------------------------
  # Build output, vendor directories, and auto-generated code rarely contain
  # real secrets but can trigger noisy alerts.
  - "**/dist/**"
  - "**/build/**"
  - "**/vendor/**"
  - "**/node_modules/**"
  - "**/*.generated.*"
  - "**/*.min.js"
  - "**/*.min.css"

  # ---- Lock files -----------------------------------------------------------
  # Package lock files contain registry URLs and hashes, not secrets.
  - "**/package-lock.json"
  - "**/yarn.lock"
  - "**/pnpm-lock.yaml"
  - "**/Pipfile.lock"
  - "**/poetry.lock"
  - "**/Gemfile.lock"
  - "**/composer.lock"

# =============================================================================
# ⚠️  Do NOT exclude:
#   - Source code directories (src/, lib/, app/)
#   - Configuration directories (.github/, .config/)
#   - Environment files (.env* are a common source of real leaks)
#   - Infrastructure-as-code (terraform/, cdk/, cloudformation/)
#
# If you're seeing false positives in source code, consider using push
# protection bypass or marking the alert as "false positive" in the UI
# instead of excluding the entire path.
# =============================================================================
