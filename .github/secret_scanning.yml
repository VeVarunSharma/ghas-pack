# Secret scanning path exclusions for the GHAS-Pack demo repository.
#
# These paths are excluded because:
#   - examples/vulnerable/** contains intentionally insecure sample code
#     with fake/demo secrets used for training purposes.
#   - docs/** holds documentation that may reference example tokens or
#     placeholder credentials in code snippets.
#   - **/*.md markdown files may contain illustrative secret examples
#     that are not real credentials.
#
# In a production repository you should keep exclusions to an absolute
# minimum so that secret scanning provides maximum coverage.

paths-ignore:
  - 'examples/vulnerable/**'
  - 'docs/**'
  - '**/*.md'
