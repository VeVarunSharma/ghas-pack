# Dependency Review workflow for the GHAS-Pack demo repository.
# Runs on every pull request to detect newly introduced dependencies
# with known vulnerabilities or disallowed licenses.

name: "Dependency Review"

on:
  pull_request:

# Permissions needed to read repository contents, post PR comments, and
# enable the Dependency Graph via the repository administration API.
permissions:
  contents: read
  pull-requests: write
  administration: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the action can compare dependency changes.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ensure the Dependency Graph is enabled so the dependency-review action
      # can compare dependency changes between the base and head commits.
      # The PATCH call is idempotent; it is a no-op if already enabled.
      # administration: write permission is required solely for this API call —
      # there is no more granular GitHub token permission for enabling the
      # Dependency Graph programmatically.
      - name: Enable Dependency Graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/dg_response.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}" \
            -d '{"security_and_analysis":{"dependency_graph":{"status":"enabled"}}}')
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 204 ]; then
            echo "Failed to enable Dependency Graph (HTTP $HTTP_STATUS):"
            cat /tmp/dg_response.json
            exit 1
          fi
          echo "Dependency Graph enabled (HTTP $HTTP_STATUS)."

      # Run the dependency review action.
      #   fail-on-severity  – fail the check if any new dependency has a
      #                       vulnerability of "moderate" severity or higher.
      #   deny-licenses     – block pull requests that introduce dependencies
      #                       under the GPL-3.0 license (example policy).
      #   comment-summary-in-pr – post a summary comment on the pull request
      #                           with the review results.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: "moderate"
          deny-licenses: "GPL-3.0"
          comment-summary-in-pr: "always"
