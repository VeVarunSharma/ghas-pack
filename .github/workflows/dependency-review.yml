# Dependency Review workflow for the GHAS-Pack demo repository.
# Runs on every pull request to detect newly introduced dependencies
# with known vulnerabilities or disallowed licenses.

name: "Dependency Review"

on:
  pull_request:

# Permissions needed to read repository contents, post PR comments,
# and enable the Dependency Graph via the GitHub REST API.
permissions:
  contents: read
  pull-requests: write
  administration: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the action can compare dependency changes.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Enable the Dependency Graph feature via the GitHub REST API if it is
      # not already active.  This is a prerequisite for dependency-review-action
      # to compare dependency changes between the base and head commits.
      # The administration:write permission (declared above) is the minimum
      # permission required by the GitHub REST API to update security settings.
      # The check-before-enable pattern avoids redundant API calls on repos
      # where the Dependency Graph is already enabled.
      - name: Enable Dependency Graph
        run: |
          status=$(gh api /repos/${{ github.repository }} \
            --jq '.security_and_analysis.dependency_graph.status // "disabled"' \
            2>/dev/null || echo "disabled")
          if [ "$status" != "enabled" ]; then
            echo "Dependency Graph is not enabled – enabling now..."
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }} \
              -f 'security_and_analysis[dependency_graph][status]=enabled'
          else
            echo "Dependency Graph is already enabled – no action needed."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Run the dependency review action.
      #   fail-on-severity  – fail the check if any new dependency has a
      #                       vulnerability of "moderate" severity or higher.
      #   deny-licenses     – block pull requests that introduce dependencies
      #                       under the GPL-3.0 license (example policy).
      #   comment-summary-in-pr – post a summary comment on the pull request
      #                           with the review results.
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: "moderate"
          deny-licenses: "GPL-3.0"
          comment-summary-in-pr: "always"
