# CodeQL Analysis workflow for the GHAS-Pack demo repository.
# Runs CodeQL static analysis across multiple languages on push,
# pull request, and on a weekly schedule.

name: "CodeQL Analysis"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

# Minimum permissions required for CodeQL scanning.
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Add or remove languages as needed.
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: java-kotlin
            build-mode: none
          - language: csharp
            build-mode: none

    steps:
      # Step 1 – Check out the repository so CodeQL can access the source.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 – Initialise the CodeQL tools and create a database for
      # the language specified in the matrix.  The custom config file
      # extends the default queries with the security-and-quality suite.
      # build-mode: "none" performs buildless extraction for all languages,
      # which works for standalone source files that lack a top-level build
      # system (the pom.xml / .csproj files are nested in sub-directories).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
          dependency-caching: true

      # Step 3 – Run the CodeQL analysis and upload results to the
      # GitHub Security tab.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
