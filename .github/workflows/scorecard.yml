# OSSF Scorecard workflow for the GHAS-Pack demo repository.
# Evaluates the repository against supply-chain security best practices
# and uploads the results to the GitHub Security tab.

name: "Scorecard Supply-Chain Security"

on:
  push:
    branches: [main]
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

# Declare read-only at the workflow level; write permissions are granted
# per-job below, which is required by ossf/scorecard-action when
# publish_results is enabled.
# See https://github.com/ossf/scorecard-action#workflow-restrictions
permissions: read-all

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest

    # Permissions required by the Scorecard action and SARIF upload.
    # Must be scoped to the job, not the workflow, when publish_results: true.
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      # Check out the repository for analysis.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Run the OSSF Scorecard analysis.
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # Upload the SARIF results to the GitHub Security tab so findings
      # appear alongside CodeQL and other security alerts.
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
